---
tools:
- sourceOperationId: "getCustomerById"
  name: "getCustomerById"
  title: "Consultar cliente por ID"
  description: "Consulta un cliente por su identificador exacto. Úsala cuando ya conoces\
    \ el customerId y requieres información puntual del cliente.\n"
  inputSchema:
    type: "object"
    additionalProperties: false
    properties:
      customerId:
        type: "string"
        description: "Internal customer identifier."
    required:
    - "customerId"
  outputSchema:
    type: "object"
    description: "Respuesta simplificada inferida desde OpenAPI para PoC"
  annotations:
    readOnlyHint: true
    destructiveHint: false
    idempotentHint: true
    openWorldHint: false
  binding:
    handler: "customers.getById"
    mode: "spring-bean"
  excluded: false
- sourceOperationId: "searchOrders"
  name: "searchOrders"
  title: "Buscar órdenes"
  description: "Busca órdenes por documento del cliente y por estado. Úsala cuando\
    \ no conoces un orderId exacto.\n"
  inputSchema:
    type: "object"
    additionalProperties: false
    properties:
      customerDocument:
        type: "string"
        description: "Customer document number."
      status:
        type: "string"
        description: "Order status."
        enum:
        - "CREATED"
        - "PAID"
        - "CANCELLED"
    required: []
  outputSchema:
    type: "object"
    description: "Respuesta simplificada inferida desde OpenAPI para PoC"
  annotations:
    readOnlyHint: true
    destructiveHint: false
    idempotentHint: true
    openWorldHint: false
  binding:
    handler: "orders.search"
    mode: "spring-bean"
  excluded: false
resources:
- uri: "openapi://summary"
  title: "Resumen del contrato"
  description: "Resumen generado del contrato OpenAPI para dar contexto al modelo\
    \ o al equipo.\n"
  mimeType: "text/plain"
  text: "title=Demo Customer API, version=1.0.0, paths=2"
  excluded: false
- uri: "openapi://operations/getCustomerById"
  title: "OpenAPI Operation getCustomerById"
  description: "Documentación breve de la operación getCustomerById"
  mimeType: "text/plain"
  text: "operationId=getCustomerById\nmethod=GET\npath=/customers/{customerId}\nsummary=Get\
    \ customer by id\ndescription=Returns the customer identified by the provided\
    \ customerId."
  excluded: false
- uri: "openapi://operations/searchOrders"
  title: "OpenAPI Operation searchOrders"
  description: "Documentación breve de la operación searchOrders"
  mimeType: "text/plain"
  text: "operationId=searchOrders\nmethod=GET\npath=/orders\nsummary=Search orders\n\
    description=Search orders using customer document and status."
  excluded: false
prompts:
- name: "summarizeContract"
  title: "Resumir contrato"
  description: "Genera un resumen del contrato OpenAPI cargado"
  arguments:
  - name: "audience"
    description: "Audiencia objetivo"
    required: false
  - name: "tone"
    description: "Tono del resumen"
    required: false
  template: "Resume el contrato OpenAPI para la audiencia {{audience}}.\nUsa un tono\
    \ {{tone}}.\n"
  excluded: false
