server:
  port: 8080

spring:
  application:
    name: mcp-manifest-poc
  ai:
    mcp:
      server:
        enabled: true
        name: mcp-manifest-poc
        version: 0.0.1
        protocol: STREAMABLE
        type: SYNC
        capabilities:
          tool: true
          resource: true
          prompt: true
          completion: false
        streamable-http:
          mcp-endpoint: /mcp

app:
  openapi:
    location: classpath:openapi/demo-contract.yaml
  overrides:
    location: classpath:mcp-overrides.yaml
  manifest:
    export-on-startup: true
    export-dir: build/mcp-manifests
